services:
  - type: web
    name: chess-engine-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
  - type: web
    name: chess-engine-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://chessengine-2.onrender.com
      - key: VITE_WS_BASE_URL
        value: wss://chessengine-2.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
